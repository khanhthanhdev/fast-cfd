<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1a1a2e"/>
  <g transform="translate(100, 100)">
    <!-- Return grille - rectangular with slats -->
    <rect x="-50" y="-20" width="100" height="40" fill="#737373" stroke="#a3a3a3" stroke-width="2" rx="2"/>
    <!-- Grille slats -->
    <line x1="-40" y1="-15" x2="40" y2="-15" stroke="#525252" stroke-width="2"/>
    <line x1="-40" y1="-5" x2="40" y2="-5" stroke="#525252" stroke-width="2"/>
    <line x1="-40" y1="5" x2="40" y2="5" stroke="#525252" stroke-width="2"/>
    <line x1="-40" y1="15" x2="40" y2="15" stroke="#525252" stroke-width="2"/>
    <!-- Inward arrows -->
    <path d="M -20 -25 L -20 -10 M -25 -15 L -20 -10 L -15 -15" stroke="#f97316" stroke-width="2" fill="none"/>
    <path d="M 20 -25 L 20 -10 M 25 -15 L 20 -10 L 15 -15" stroke="#f97316" stroke-width="2" fill="none"/>
  </g>
  <text x="100" y="185" text-anchor="middle" fill="#a3a3a3" font-size="12" font-family="system-ui">Return Grille</text>
</svg>
